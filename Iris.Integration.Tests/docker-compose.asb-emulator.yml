# Azure Service Bus Emulator — standalone alternative for local development.
#
# Usage:
#   docker compose -f docker-compose.asb-emulator.yml up -d
#   dotnet test --filter "FullyQualifiedName~AzureServiceBusContainerTests"
#   docker compose -f docker-compose.asb-emulator.yml down
#
# The integration tests manage their own containers via Docker.DotNet,
# so this compose file is only needed if you want to keep the emulator
# running across multiple test runs during local development.

services:
  sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrongPassword123!"

  servicebus:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    depends_on:
      - sqledge
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "YourStrongPassword123!"
    ports:
      - "5672:5672"
    volumes:
      - ./Brokers/Resources/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
