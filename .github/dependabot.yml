version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dotnet:
        patterns:
          - "Microsoft.*"
          - "System.*"
      testing:
        patterns:
          - "xunit*"
          - "NSubstitute*"
          - "FluentAssertions*"
          - "bunit*"
          - "Testcontainers*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
