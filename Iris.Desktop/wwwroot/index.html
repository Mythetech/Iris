<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iris</title>
    <base href="/" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://cdn-endpnt-stmythetechglobal.azureedge.net/assets/material-symbols.css" rel="stylesheet" type="text/css" />
    <link href="Iris.styles.css" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="_content/Mythetech.Framework/mythetech.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="_content/Iris.Components/css/app.css" />
    <link href="desktop.css" rel="stylesheet" type="text/css" />
    <link rel="icon" type="image/png" href="_content/Iris.Components/favicon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="_content/Iris.Components/icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="_content/Iris.Components/icon-192.png" />
    <style>
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99998;
        }

        .canvas-bg-container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000000;
        }

        #iris-splash {
            position: fixed;
            z-index: 99999;
            top: 25%;
            left: calc(50vw - 250px);
            width: 500px;
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            border-radius: 0.5em;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            font-family: Helvetica-Neue, Helvetica, Arial, sans-serif;
        }

        #iris-splash .loader {
            width: 75%;
            height: 4.8px;
            display: inline-block;
            position: relative;
            background: color-mix(in srgb, var(--mud-palette-primary) 15%, transparent);
            overflow: hidden;
        }

        #iris-splash .loader::after {
            content: '';
            width: 192px;
            height: 4.8px;
            background: var(--mud-palette-primary);
            position: absolute;
            top: 0;
            left: -192px;
            box-sizing: border-box;
            animation: animloader 2s linear infinite;
        }

        @keyframes animloader {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(calc(500px + 192px));
            }
        }

        #iris-splash.fade-out,
        #particle-canvas.fade-out {
            opacity: 0;
            transition: opacity 1s ease-out;
            pointer-events: none;
        }
    </style>
</head>

<body>
<div id="particle-canvas" class="canvas-bg-container"></div>
<div id="iris-splash">
    <img alt="Iris Logo" src="_content/Iris.Components/icon-512.png" style="width:150px;height:150px;object-fit:contain;margin-bottom:-2rem;" />
    <h3>Initializing Iris...</h3>
        <span class="loader mt-4"></span>
</div>
<div id="app"></div>

<div id="blazor-error-ui">
    <span class="text-primary">An unhandled error has occurred.</span>
    <a href="" class="reload">Reload</a>
    <a class="dismiss text-decoration-none">❌</a>
</div>

<script>
    // Fix AMD loader conflict for dynamically injected plugin scripts
    // Hide define.amd temporarily when scripts are injected so UMD scripts use global fallback
    (function() {
        var originalAppendChild = Element.prototype.appendChild;
        Element.prototype.appendChild = function(child) {
            if (child.tagName === 'SCRIPT' && child.textContent && window.define && window.define.amd) {
                var savedAmd = window.define.amd;
                delete window.define.amd;
                var result = originalAppendChild.call(this, child);
                Promise.resolve().then(function() {
                    if (window.define && !window.define.amd) {
                        window.define.amd = savedAmd;
                    }
                });
                return result;
            }
            return originalAppendChild.call(this, child);
        };
    })();
</script>

</script>
